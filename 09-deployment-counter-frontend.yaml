apiVersion: apps/v1
kind: Deployment
metadata:
  name: counter-frontend
  labels:
    app: counter-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: counter-frontend
  template:
    metadata:
      labels:
        app: counter-frontend
    spec:
      containers:
        - name: counter-frontend
          image: ghcr.io/corner-gif/counter-frontend:v1
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: BACKEND_URL
              value: https://counter-backend-abc123.apps.ocp4.mcit.ch
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: npm_config_cache
              value: ./.npm-cache
            - name: BACKEND_URL
              value: counter-backend-264495-corleu.apps.exoscale-ch-gva-2-0.appuio.cloud 